<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<p>Click each button to download your icon files. Then upload them to GitHub in an <strong>icons/</strong> folder.</p>
<button onclick="download(192)">Download icon-192.png</button>
<button onclick="download(512)">Download icon-512.png</button>
<canvas id="c"></canvas>
<script>
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function drawHCIcon(canvas){var sz=canvas.width,vb=220,s=sz/vb,ctx=canvas.getContext('2d');ctx.fillStyle='#5BB8F5';roundRect(ctx,0,0,sz,sz,44*s);ctx.fill();ctx.fillStyle='#1a1a1a';roundRect(ctx,60*s,50*s,16*s,134*s,4*s);ctx.fill();roundRect(ctx,20*s,92*s,96*s,16*s,4*s);ctx.fill();ctx.strokeStyle='white';ctx.lineWidth=7*s;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();var pts=[[68,100],[84,78],[102,87],[122,64],[144,42]];ctx.moveTo(pts[0][0]*s,pts[0][1]*s);for(var i=1;i<pts.length;i++)ctx.lineTo(pts[i][0]*s,pts[i][1]*s);ctx.stroke();ctx.fillStyle='white';ctx.beginPath();ctx.arc(144*s,42*s,7*s,0,Math.PI*2);ctx.fill();ctx.fillStyle='white';ctx.font='700 '+Math.round(48*s)+'px Arial,sans-serif';ctx.textAlign='right';ctx.fillText('HC',192*s,186*s);}
function download(size){var c=document.getElementById('c');c.width=c.height=size;drawHCIcon(c);var a=document.createElement('a');a.download='icon-'+size+'.png';a.href=c.toDataURL('image/png');a.click();}
</script>
</body>
</html>
